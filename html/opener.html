<!DOCTYPE html>
<html>
<head>
    <title>Skynet Launcher</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding-top: 50px;
            background: #1a1a1a;
            color: #ccc;
        }

        .btn {
            padding: 10px 20px;
            background: #444;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

            .btn:hover {
                background: #666;
            }
    </style>
</head>
<body>
    <div id="status">Launching Skynet Dashboard...</div>
    <br>
    <button id="manualBtn" class="btn" style="display:none;" onclick="launch()">Click to Launch Manually</button>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const target = urlParams.get('target') || '/skynetjs.html';
        let attemptCount = 0;

        function launch() {
            // Attempt to open the dashboard
            const dash = window.open(target, 'skynet_dash');

            if (dash) {
                document.getElementById('status').innerText = "Dashboard opened. Closing launcher...";
                // Small delay to ensure the browser processes the 'open' before the 'close'
                setTimeout(() => {
                    window.open('', '_self', ''); // Chrome trick to "own" the window so it can close
                    window.close();
                    // Fallback if window.close() is denied by browser policy
                    setTimeout(() => {
                        window.location.replace('about:blank');
                    }, 500);
                }, 300);
            } else {
                // Popup was blocked
                document.getElementById('status').innerText = "Popup Blocked! Please click below:";
                document.getElementById('manualBtn').style.display = "inline-block";
            }
        }

        // Try to launch automatically on load
        window.onload = launch;
    </script>
</body>
</html>
